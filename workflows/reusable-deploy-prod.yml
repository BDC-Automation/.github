name: Reusable Production Deployment

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      version_sha:
        required: true
        type: string
        description: 'Git SHA to deploy (must be tested in UAT)'
    secrets:
      AWS_ROLE_ARN:
        required: true
      SLACK_WEBHOOK:
        required: false

env:
  AWS_REGION: us-east-1
  S3_BUCKET: bdcautomation-artifactory

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: Production
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version_sha }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Validate version exists
        run: |
          VERSION="${{ inputs.version_sha }}"
          
          echo "🔍 Validating version v-${VERSION}..."
          
          # Check S3
          if ! aws s3 ls s3://${{ env.S3_BUCKET }}/${{ inputs.app_name }}/app-${VERSION}.zip 2>/dev/null; then
            echo "❌ Error: Version not found in S3"
            exit 1
          fi
          
          # Check EB application version
          if ! aws elasticbeanstalk describe-application-versions \
            --application-name ${{ inputs.app_name }} \
            --version-labels v-${VERSION} \
            --query 'ApplicationVersions[0].VersionLabel' \
            --output text | grep -q "v-${VERSION}"; then
            echo "❌ Error: Application version not found in Elastic Beanstalk"
            exit 1
          fi
          
          echo "✅ Version validated"
      
      - name: Create backup of current production version
        id: backup
        run: |
          echo "💾 Creating backup of current production version..."
          
          CURRENT_VERSION=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ inputs.app_name }} \
            --environment-names ${{ inputs.app_name }}-prod \
            --query 'Environments[0].VersionLabel' --output text)
          
          echo "Current production version: $CURRENT_VERSION"
          echo "backup_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          # Store backup info
          echo "BACKUP_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
      
      - name: Run database migrations (PROD)
        run: |
          echo "🗄️  Running database migrations for PRODUCTION..."
          
          # Check if migrations directory exists
          if [ ! -d "db/migrations" ]; then
            echo "⏭️  No migrations directory found, skipping..."
            exit 0
          fi
          
          # Get DB credentials
          DB_CREDS=$(aws secretsmanager get-secret-value \
            --secret-id /app/prod/${{ inputs.app_name }}/db-credentials \
            --query SecretString --output text 2>/dev/null || echo "{}")
          
          if [ "$DB_CREDS" = "{}" ]; then
            echo "⏭️  No database credentials found, skipping migrations..."
            exit 0
          fi
          
          DB_URL=$(echo $DB_CREDS | jq -r '.url')
          DB_USER=$(echo $DB_CREDS | jq -r '.username')
          DB_PASS=$(echo $DB_CREDS | jq -r '.password')
          
          # Install Flyway
          wget -qO- https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.4.1/flyway-commandline-10.4.1-linux-x64.tar.gz | tar xvz
          
          # Run migrations
          ./flyway-10.4.1/flyway migrate \
            -url="$DB_URL" \
            -user="$DB_USER" \
            -password="$DB_PASS" \
            -locations=filesystem:./db/migrations
          
          echo "✅ PRODUCTION database migrations completed"
      
      - name: Deploy to Production
        id: deploy
        run: |
          VERSION="${{ inputs.version_sha }}"
          
          echo "🚀 Deploying version v-${VERSION} to PRODUCTION..."
          echo "⚠️  This is a PRODUCTION deployment!"
          
          aws elasticbeanstalk update-environment \
            --application-name ${{ inputs.app_name }} \
            --environment-name ${{ inputs.app_name }}-prod \
            --version-label v-${VERSION}
          
          echo "⏳ Waiting for deployment to complete..."
      
      - name: Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ inputs.app_name }} \
            --environment-name ${{ inputs.app_name }}-prod \
            --no-cli-pager
          
          echo "✅ Deployment completed"
      
      - name: Health check and verification
        id: health_check
        run: |
          echo "🏥 Running production health checks..."
          sleep 60
          
          HEALTH_URL=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ inputs.app_name }} \
            --environment-names ${{ inputs.app_name }}-prod \
            --query 'Environments[0].CNAME' --output text)
          
          echo "Health check URL: http://$HEALTH_URL/health"
          
          # Multiple health checks
          SUCCESS=false
          for i in {1..10}; do
            if curl -f -s http://$HEALTH_URL/health > /dev/null; then
              echo "✅ Health check passed (attempt $i)"
              SUCCESS=true
              break
            fi
            echo "⏳ Waiting for application (attempt $i/10)..."
            sleep 10
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ Health check failed after 10 attempts"
            echo "health_check_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "health_check_passed=true" >> $GITHUB_OUTPUT
          
          # Additional smoke tests
          echo "🧪 Running smoke tests..."
          
          if curl -f -s http://$HEALTH_URL/ > /dev/null; then
            echo "✅ Root endpoint accessible"
          fi
          
          echo "✅ All health checks passed"
      
      - name: Rollback on failure
        if: failure() && steps.health_check.outputs.health_check_passed == 'false'
        run: |
          echo "🔄 ROLLING BACK to version: ${{ env.BACKUP_VERSION }}"
          echo "⚠️  Production deployment failed health checks!"
          
          aws elasticbeanstalk update-environment \
            --application-name ${{ inputs.app_name }} \
            --environment-name ${{ inputs.app_name }}-prod \
            --version-label ${{ env.BACKUP_VERSION }}
          
          echo "✅ Rollback initiated to ${{ env.BACKUP_VERSION }}"
          
          # Send critical alert
          if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
            curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "<!channel> 🚨 PRODUCTION DEPLOYMENT FAILED - ROLLED BACK",
                "attachments": [{
                  "color": "danger",
                  "title": "Critical: Production Deployment Failure",
                  "fields": [
                    {"title": "Application", "value": "${{ inputs.app_name }}", "short": true},
                    {"title": "Attempted Version", "value": "${{ inputs.version_sha }}", "short": true},
                    {"title": "Rolled Back To", "value": "${{ env.BACKUP_VERSION }}", "short": true},
                    {"title": "Action Required", "value": "Investigate immediately", "short": true}
                  ]
                }]
              }'
          fi
      
      - name: Record deployment
        if: success()
        run: |
          VERSION="${{ inputs.version_sha }}"
          
          aws dynamodb put-item \
            --table-name deployment-tracking \
            --item '{
              "app_name": {"S": "${{ inputs.app_name }}"},
              "environment": {"S": "prod"},
              "version": {"S": "v-'"${VERSION}"'"},
              "commit_sha": {"S": "'"${VERSION}"'"},
              "deployed_at": {"S": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"},
              "deployed_by": {"S": "${{ github.actor }}"},
              "branch": {"S": "release"},
              "workflow_run_id": {"S": "${{ github.run_id }}"}
            }' 2>/dev/null || echo "Could not record deployment"
      
      - name: Tag production release
        if: success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          VERSION="${{ inputs.version_sha }}"
          VERSION_SHORT=$(echo $VERSION | cut -c1-7)
          
          # Semantic version tag
          MAJOR_MINOR=$(date +%Y.%m)
          PATCH=$(git tag -l "${MAJOR_MINOR}.*" 2>/dev/null | wc -l)
          SEMVER="${MAJOR_MINOR}.${PATCH}"
          
          git tag -a $SEMVER $VERSION -m "Production release $SEMVER - $(date +%Y-%m-%d)"
          git push origin $SEMVER || echo "Could not push tag"
          
          # Also create environment-specific tag
          TAG_NAME="${{ inputs.app_name }}-prod-$(date +%Y%m%d-%H%M%S)"
          git tag -a $TAG_NAME $VERSION -m "Deployed to PRODUCTION"
          git push origin $TAG_NAME || echo "Could not push tag"
          
          echo "✅ Tagged as: $SEMVER and $TAG_NAME"
      
      - name: Notify success
        if: success() && secrets.SLACK_WEBHOOK != ''
        run: |
          VERSION="${{ inputs.version_sha }}"
          VERSION_SHORT=$(echo $VERSION | cut -c1-7)
          
          HEALTH_URL=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ inputs.app_name }} \
            --environment-names ${{ inputs.app_name }}-prod \
            --query 'Environments[0].CNAME' --output text)
          
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "🎉 PRODUCTION DEPLOYMENT SUCCESSFUL",
              "attachments": [{
                "color": "good",
                "title": "Production Deployment - ${{ inputs.app_name }}",
                "fields": [
                  {"title": "Version", "value": "'"$VERSION_SHORT"'", "short": true},
                  {"title": "Deployed By", "value": "${{ github.actor }}", "short": true},
                  {"title": "Time", "value": "'"$(date)"'", "short": true},
                  {"title": "URL", "value": "http://'"$HEALTH_URL"'", "short": true},
                  {"title": "Status", "value": "✅ Healthy", "short": true},
                  {"title": "Previous Version", "value": "${{ env.BACKUP_VERSION }}", "short": true}
                ]
              }]
            }'
