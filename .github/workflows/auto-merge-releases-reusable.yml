name: Auto-Merge Release Branches (Reusable)

on:
  workflow_call:
    inputs:
      branch-pattern:
        description: 'Prefix identifying release branches (e.g. release/*)'
        required: true
        type: string
      date-format:
        description: >-
          How the release suffix is ordered: "date" (DD-MM-YYYY release dates,
          normalized to YYYYMMDD for correct chronological ordering) or "semver".
        required: false
        type: string
        default: 'date'

# No PRs are created, so only write access to repo contents is needed.
permissions:
  contents: write

jobs:
  cascade-merge:
    name: Cascade Merge to Newer Releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Determine current (just-pushed) release branch
        id: current
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Pushed branch: $BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          PREFIX="${{ inputs.branch-pattern }}"
          PREFIX="${PREFIX%\*}"   # "release/*" -> "release/"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "suffix=${BRANCH#${PREFIX}}" >> "$GITHUB_OUTPUT"

      - name: Compute all newer release branches (ascending)
        id: targets
        run: |
          set -euo pipefail
          PREFIX="${{ steps.current.outputs.prefix }}"
          CURRENT="${{ steps.current.outputs.suffix }}"
          MODE="${{ inputs.date-format }}"

          # Normalize a suffix to a sortable key.
          # DD-MM-YYYY -> YYYYMMDD so a plain string sort == chronological order.
          norm() {
            local s="$1"
            if [[ "$s" =~ ^([0-9]{2})-([0-9]{2})-([0-9]{4})$ ]]; then
              echo "${BASH_REMATCH[3]}${BASH_REMATCH[2]}${BASH_REMATCH[1]}"
            else
              echo "$s"
            fi
          }

          mapfile -t SUFFIXES < <(
            git for-each-ref --format='%(refname:short)' "refs/remotes/origin/${PREFIX}*" \
              | sed "s|^origin/||" \
              | sed "s|^${PREFIX}||" \
              | grep -v '^$' | sort -u
          )
          echo "Discovered release branches (suffixes): ${SUFFIXES[*]:-<none>}"

          # Guard: nothing to do if this is the only release branch.
          if [ "${#SUFFIXES[@]}" -le 1 ]; then
            echo "ℹ️  '${PREFIX}${CURRENT}' is the only release branch."
            echo "    No newer release branch exists -> nothing is merged or pushed."
            echo "has-target=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_KEY="$(norm "$CURRENT")"

          # Build "key<TAB>suffix", order ascending, keep only strictly-newer.
          PAIRS=""
          for s in "${SUFFIXES[@]}"; do
            PAIRS+="$(norm "$s")\t$s\n"
          done
          if [ "$MODE" = "semver" ]; then
            ORDERED=$(printf '%b' "$PAIRS" | sort -V)
          else
            ORDERED=$(printf '%b' "$PAIRS" | LC_ALL=C sort)
          fi

          NEWER=()
          while IFS=$'\t' read -r key suffix; do
            [ -z "${suffix:-}" ] && continue
            [ "$suffix" = "$CURRENT" ] && continue
            if [ "$MODE" = "semver" ]; then
              GREATER=$(printf '%s\n%s\n' "$CURRENT" "$suffix" | sort -V | tail -n1)
              [ "$GREATER" = "$suffix" ] || continue
            else
              [[ "$key" > "$CURRENT_KEY" ]] || continue
            fi
            NEWER+=("${PREFIX}${suffix}")
          done <<< "$ORDERED"

          if [ "${#NEWER[@]}" -eq 0 ]; then
            echo "ℹ️  '${PREFIX}${CURRENT}' is already the newest release branch."
            echo "    Nothing newer to cascade into -> nothing is merged or pushed."
            echo "has-target=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Cascade order: ${{ steps.current.outputs.branch }} -> ${NEWER[*]}"
            echo "has-target=true" >> "$GITHUB_OUTPUT"
            # space-separated, oldest -> newest
            echo "branches=${NEWER[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cascade merge through all newer release branches (no PR)
        if: steps.targets.outputs.has-target == 'true'
        run: |
          set -euo pipefail
          SOURCE="${{ steps.current.outputs.branch }}"
          read -r -a TARGETS <<< "${{ steps.targets.outputs.branches }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Sequential cascade: SOURCE -> T1 -> T2 -> ... -> Tn
          PREV_REF="origin/${SOURCE}"
          for TARGET in "${TARGETS[@]}"; do
            echo "----------------------------------------"
            echo "Cascading into: ${TARGET}  (from: ${PREV_REF})"

            if git diff --quiet "origin/${TARGET}" "${PREV_REF}"; then
              echo "ℹ️  '${TARGET}' already contains '${PREV_REF}'. Skipping."
              git checkout -B "$TARGET" "origin/${TARGET}"
              PREV_REF="$TARGET"
              continue
            fi

            git checkout -B "$TARGET" "origin/${TARGET}"
            if git merge --no-edit "$PREV_REF"; then
              git push origin "HEAD:${TARGET}"
              echo "✅ Merged and pushed -> ${TARGET}"
            else
              git merge --abort || true
              echo "❌ Merge conflict cascading into '${TARGET}'."
              echo "   Cascade STOPPED here. Per policy NO pull request is created;"
              echo "   resolve the conflict manually, then re-run or push '${TARGET}'."
              exit 1
            fi

            # Continue the chain from the branch we just produced.
            PREV_REF="$TARGET"
          done

          echo "----------------------------------------"
          echo "✅ Cascade complete across: ${TARGETS[*]}"

      - name: Cascade summary
        if: always()
        run: |
          echo "================================"
          echo "Auto-Merge Release Summary"
          echo "================================"
          echo "Source branch:    ${{ steps.current.outputs.branch }}"
          echo "Has newer target: ${{ steps.targets.outputs.has-target }}"
          echo "Cascade order:    ${{ steps.targets.outputs.branches }}"
          echo "Mode:             ${{ inputs.date-format }}"
          echo "Result:           ${{ job.status }}"
          echo "================================"
