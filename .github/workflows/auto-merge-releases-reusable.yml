name: Auto-Merge Release Branches (Reusable)

on:
  workflow_call:
    inputs:
      branch-pattern:
        description: 'Prefix identifying release branches (e.g. release/*)'
        required: true
        type: string
      date-format:
        description: >-
          How the release suffix is ordered: "date" (DD-MM-YYYY release dates,
          normalized to YYYYMMDD for correct chronological ordering) or "semver".
        required: false
        type: string
        default: 'date'

# No PRs are created, so only write access to repo contents is needed.
permissions:
  contents: write

jobs:
  cascade-merge:
    name: Cascade Merge to Newer Releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Determine current (just-pushed) release branch
        id: current
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Pushed branch: $BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          PREFIX="${{ inputs.branch-pattern }}"
          PREFIX="${PREFIX%\*}"   # "release/*" -> "release/"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "suffix=${BRANCH#${PREFIX}}" >> "$GITHUB_OUTPUT"

      - name: Find the next newer release branch
        id: target
        run: |
          set -euo pipefail
          PREFIX="${{ steps.current.outputs.prefix }}"
          CURRENT="${{ steps.current.outputs.suffix }}"
          MODE="${{ inputs.date-format }}"

          # Normalize a suffix to a sortable key.
          # DD-MM-YYYY -> YYYYMMDD so string sort == chronological order.
          norm() {
            local s="$1"
            if [[ "$s" =~ ^([0-9]{2})-([0-9]{2})-([0-9]{4})$ ]]; then
              echo "${BASH_REMATCH[3]}${BASH_REMATCH[2]}${BASH_REMATCH[1]}"
            else
              echo "$s"
            fi
          }

          mapfile -t SUFFIXES < <(
            git for-each-ref --format='%(refname:short)' "refs/remotes/origin/${PREFIX}*" \
              | sed "s|^origin/||" \
              | sed "s|^${PREFIX}||" \
              | grep -v '^$' | sort -u
          )

          echo "Discovered release branches (suffixes): ${SUFFIXES[*]:-<none>}"

          # Guard: if this is the only release branch, do nothing at all.
          if [ "${#SUFFIXES[@]}" -le 1 ]; then
            echo "ℹ️  '${PREFIX}${CURRENT}' is the only release branch."
            echo "    No newer release branch exists -> nothing is merged or pushed."
            echo "has-target=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_KEY="$(norm "$CURRENT")"

          # Build "key<TAB>suffix" lines and order them.
          PAIRS=""
          for s in "${SUFFIXES[@]}"; do
            PAIRS+="$(norm "$s")\t$s\n"
          done
          if [ "$MODE" = "semver" ]; then
            SORTED=$(printf '%b' "$PAIRS" | sort -V)
          else
            SORTED=$(printf '%b' "$PAIRS" | LC_ALL=C sort)
          fi

          NEXT=""
          while IFS=$'\t' read -r key suffix; do
            [ -z "${suffix:-}" ] && continue
            [ "$suffix" = "$CURRENT" ] && continue
            if [ "$MODE" = "semver" ]; then
              GREATER=$(printf '%s\n%s\n' "$CURRENT" "$suffix" | sort -V | tail -n1)
              [ "$GREATER" = "$suffix" ] || continue
            else
              # strictly greater normalized key == strictly newer date
              [[ "$key" > "$CURRENT_KEY" ]] || continue
            fi
            NEXT="$suffix"
            break
          done <<< "$SORTED"

          if [ -z "$NEXT" ]; then
            echo "ℹ️  '${PREFIX}${CURRENT}' is already the newest release branch."
            echo "    Nothing newer to cascade into -> nothing is merged or pushed."
            echo "has-target=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Next newer release branch: ${PREFIX}${NEXT}"
            echo "has-target=true" >> "$GITHUB_OUTPUT"
            echo "target-branch=${PREFIX}${NEXT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-merge into the next newer release branch (no PR)
        if: steps.target.outputs.has-target == 'true'
        run: |
          set -euo pipefail
          SOURCE="${{ steps.current.outputs.branch }}"
          TARGET="${{ steps.target.outputs.target-branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet "origin/${TARGET}" "origin/${SOURCE}"; then
            echo "ℹ️  '${SOURCE}' and '${TARGET}' are already identical. Nothing to merge."
            exit 0
          fi

          echo "Auto-merging ${SOURCE} -> ${TARGET} (direct merge + push, no pull request)"
          git checkout -B "$TARGET" "origin/${TARGET}"

          if git merge --no-edit "origin/${SOURCE}"; then
            git push origin "HEAD:${TARGET}"
            echo "✅ Auto-merged and pushed: ${SOURCE} -> ${TARGET}"
            echo "   The push to ${TARGET} re-triggers this workflow, which cascades to the next newer branch."
          else
            git merge --abort || true
            echo "❌ Merge conflict between '${SOURCE}' and '${TARGET}'."
            echo "   Per policy NO pull request is created; conflicts must be resolved manually"
            echo "   (e.g. merge '${SOURCE}' into '${TARGET}' locally, resolve, and push)."
            exit 1
          fi

      - name: Cascade summary
        if: always()
        run: |
          echo "================================"
          echo "Auto-Merge Release Summary"
          echo "================================"
          echo "Source branch:    ${{ steps.current.outputs.branch }}"
          echo "Has newer target: ${{ steps.target.outputs.has-target }}"
          echo "Target branch:    ${{ steps.target.outputs.target-branch }}"
          echo "Mode:             ${{ inputs.date-format }}"
          echo "Result:           ${{ job.status }}"
          echo "================================"
