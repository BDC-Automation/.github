name: Enforce Branch Policy (Reusable)

on:
  workflow_call:
    inputs:
      allowed-source-pattern:
        description: 'Branch pattern allowed to merge to main (default: release/*)'
        required: false
        type: string
        default: 'release/*'
      target-branch:
        description: 'Target branch to protect (default: main)'
        required: false
        type: string
        default: 'main'

jobs:
  check-source-branch:
    name: Validate Source Branch
    runs-on: ubuntu-latest
    steps:
      - name: Check if source branch is allowed
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
          TARGET_BRANCH: ${{ github.base_ref }}
          ALLOWED_PATTERN: ${{ inputs.allowed-source-pattern }}
          CONFIGURED_TARGET: ${{ inputs.target-branch }}
        run: |
          echo "================================"
          echo "Branch Policy Check"
          echo "================================"
          echo "Source: $SOURCE_BRANCH"
          echo "Target: $TARGET_BRANCH"
          echo "Allowed pattern: $ALLOWED_PATTERN"
          echo ""
          
          # Only enforce if target is the configured target branch
          if [[ "$TARGET_BRANCH" != "$CONFIGURED_TARGET" ]]; then
            echo "✅ Policy not enforced for target: $TARGET_BRANCH"
            echo "   (Policy only applies to: $CONFIGURED_TARGET)"
            exit 0
          fi
          
          # Check if source branch matches allowed pattern
          case "$SOURCE_BRANCH" in
            $ALLOWED_PATTERN)
              echo "✅ ALLOWED: Source branch matches allowed pattern"
              echo ""
              echo "Branch Policy:"
              echo "  ✅ $ALLOWED_PATTERN → $TARGET_BRANCH (ALLOWED)"
              echo "  ❌ feature/*   → $TARGET_BRANCH (BLOCKED)"
              echo "  ❌ hotfix/*    → $TARGET_BRANCH (BLOCKED)"
              echo "  ❌ Other       → $TARGET_BRANCH (BLOCKED)"
              echo ""
              echo "This is a valid source branch."
              exit 0
              ;;
            *)
              echo "❌ BLOCKED: Source branch doesn't match allowed pattern"
              echo ""
              echo "ERROR: Branch '$SOURCE_BRANCH' cannot target '$TARGET_BRANCH'"
              echo ""
              echo "================================================"
              echo "CORRECT WORKFLOW:"
              echo "================================================"
              echo ""
              echo "1. Create feature branch from develop:"
              echo "   git checkout develop"
              echo "   git checkout -b feature/JIRA-123-description"
              echo ""
              echo "2. Create PR to develop (NOT $TARGET_BRANCH):"
              echo "   feature/JIRA-123 → develop ✅"
              echo ""
              echo "3. After merging to develop, create release:"
              echo "   git checkout develop"
              echo "   git checkout -b release/v1.0.0"
              echo ""
              echo "4. Create PR to $TARGET_BRANCH from release branch:"
              echo "   release/v1.0.0 → $TARGET_BRANCH ✅"
              echo ""
              echo "================================================"
              echo "ALLOWED WORKFLOW:"
              echo "================================================"
              echo "  feature/* → develop ✅"
              echo "  develop   → release/* ✅"
              echo "  $ALLOWED_PATTERN → $TARGET_BRANCH ✅"
              echo ""
              echo "================================================"
              echo "BLOCKED WORKFLOW (YOUR CURRENT PR):"
              echo "================================================"
              echo "  $SOURCE_BRANCH → $TARGET_BRANCH ❌ (NOT ALLOWED)"
              echo ""
              echo "Please close this PR and create a new one targeting 'develop' instead."
              echo ""
              exit 1
              ;;
          esac
