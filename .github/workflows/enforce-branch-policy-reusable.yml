name: Enforce Branch Policy (Reusable)

on:
  workflow_call:
    inputs:
      allowed-source-pattern:
        description: 'Branch pattern allowed to merge to main (default: release/*)'
        required: false
        type: string
        default: 'release/*'
      target-branch:
        description: 'Target branch to protect (default: main)'
        required: false
        type: string
        default: 'main'

jobs:
  check-source-branch:
    name: Validate Source Branch
    runs-on: ubuntu-latest
    steps:
      - name: Check if source branch is allowed
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
          TARGET_BRANCH: ${{ github.base_ref }}
        run: |
          echo "================================"
          echo "Branch Policy Check"
          echo "================================"
          echo "Source: $SOURCE_BRANCH"
          echo "Target: $TARGET_BRANCH"
          echo ""
          
          # Only enforce policy for PRs targeting 'main'
          if [[ "$TARGET_BRANCH" != "main" ]]; then
            echo "✅ Policy not enforced for target: $TARGET_BRANCH"
            echo "   (Branch policy only applies to 'main')"
            echo ""
            echo "Allowed workflows:"
            echo "  feature/* → $TARGET_BRANCH ✅"
            echo "  Any branch → $TARGET_BRANCH ✅"
            exit 0
          fi
          
          # For PRs targeting 'main', only allow release branches
          if [[ "$SOURCE_BRANCH" =~ ^release/ ]]; then
            echo "✅ ALLOWED: Release branch can merge to main"
            echo ""
            echo "Branch Policy for 'main':"
            echo "  ✅ release/* → main (ALLOWED)"
            echo "  ❌ feature/* → main (BLOCKED)"
            echo "  ❌ hotfix/*  → main (BLOCKED)"
            echo "  ❌ develop   → main (BLOCKED)"
            echo ""
            echo "This PR is allowed."
            exit 0
          else
            echo "❌ BLOCKED: Only release branches can merge to main"
            echo ""
            echo "ERROR: Branch '$SOURCE_BRANCH' cannot target 'main'"
            echo ""
            echo "================================================"
            echo "CORRECT WORKFLOW:"
            echo "================================================"
            echo ""
            echo "1. Merge your feature branch to a release branch:"
            echo "   git checkout release/DD-MM-YYYY"
            echo "   git merge $SOURCE_BRANCH"
            echo "   git push"
            echo ""
            echo "2. Create PR from release branch to main:"
            echo "   release/DD-MM-YYYY → main ✅"
            echo ""
            echo "================================================"
            echo "ALLOWED WORKFLOWS:"
            echo "================================================"
            echo "  feature/* → release/* ✅"
            echo "  feature/* → develop   ✅"
            echo "  release/* → main      ✅"
            echo ""
            echo "================================================"
            echo "BLOCKED WORKFLOW (YOUR CURRENT PR):"
            echo "================================================"
            echo "  $SOURCE_BRANCH → main ❌"
            echo ""
            echo "Please close this PR and merge to a release branch first."
            echo ""
            exit 1
          fi
