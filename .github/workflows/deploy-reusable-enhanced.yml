name: Deploy with GitHub Deployment Tracking

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Build artifact name from build job'
        required: true
        type: string
      aws-region:
        description: 'AWS region'
        required: true
        type: string
      eb-application-name:
        description: 'Elastic Beanstalk application name'
        required: true
        type: string
      eb-environment-name:
        description: 'Elastic Beanstalk environment name'
        required: true
        type: string
      platform:
        description: 'Platform (java, node, python)'
        required: true
        type: string
      environment:
        description: 'Environment name for GitHub Deployments (dev, staging, prod)'
        required: true
        type: string
      restrict-branches:
        description: 'Comma-separated list of allowed branch patterns (e.g., "main,release/**"). Empty = no restriction.'
        required: false
        type: string
        default: ''
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  verify-branch:
    name: Verify Branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch restriction
        run: |
          ALLOWED_BRANCHES="${{ inputs.restrict-branches }}"
          
          # If no restriction, skip check
          if [ -z "$ALLOWED_BRANCHES" ]; then
            echo "✅ No branch restriction configured - allowing deployment"
            exit 0
          fi
          
          CURRENT_BRANCH="${{ github.ref_name }}"
          echo "Current branch: $CURRENT_BRANCH"
          echo "Allowed patterns: $ALLOWED_BRANCHES"
          
          # Convert comma-separated list to array
          IFS=',' read -ra PATTERNS <<< "$ALLOWED_BRANCHES"
          
          # Check if current branch matches any pattern
          ALLOWED=false
          for PATTERN in "${PATTERNS[@]}"; do
            # Trim whitespace
            PATTERN=$(echo "$PATTERN" | xargs)
            
            # Convert glob pattern to regex
            if [[ "$PATTERN" == *"**" ]]; then
              # release/** → release/
              REGEX_PATTERN="${PATTERN//\*\*/.*}"
              if [[ "$CURRENT_BRANCH" =~ ^${REGEX_PATTERN} ]]; then
                ALLOWED=true
                echo "✅ Branch matches pattern: $PATTERN"
                break
              fi
            else
              # Exact match
              if [ "$CURRENT_BRANCH" = "$PATTERN" ]; then
                ALLOWED=true
                echo "✅ Branch matches: $PATTERN"
                break
              fi
            fi
          done
          
          if [ "$ALLOWED" = false ]; then
            echo "❌ Branch '$CURRENT_BRANCH' is not allowed for this deployment"
            echo "   Allowed patterns: $ALLOWED_BRANCHES"
            echo "   Environment: ${{ inputs.environment }}"
            exit 1
          fi

  deploy:
    name: Deploy to ${{ inputs.eb-environment-name }}
    needs: verify-branch
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: http://${{ steps.get-url.outputs.environment-url }}
    permissions:
      contents: read
      deployments: write

    steps:
      # Create GitHub Deployment
      - name: Create GitHub Deployment
        id: create-deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ inputs.environment }}',
              description: 'Deploy to ${{ inputs.eb-environment-name }}',
              required_contexts: [],
              auto_merge: false,
              task: 'deploy',
              payload: {
                eb_application: '${{ inputs.eb-application-name }}',
                eb_environment: '${{ inputs.eb-environment-name }}',
                platform: '${{ inputs.platform }}',
                triggered_by: context.actor
              }
            });
            
            console.log('✅ Deployment created:', deployment.data.id);
            return deployment.data.id;
      
      - name: Set deployment status to in_progress
        if: steps.create-deployment.outputs.result != ''
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.create-deployment.outputs.result }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'in_progress',
              description: '${{ inputs.environment }} deployment started'
            });
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./artifact
      
      - name: Create deployment package
        run: |
          cd artifact
          zip -r ../deployment.zip .
          cd ..
          echo "✅ Deployment package created"
          ls -lh deployment.zip
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws-region }}
      
      - name: Upload to S3
        id: upload-s3
        run: |
          VERSION_LABEL="${{ inputs.eb-application-name }}-${{ github.sha }}-$(date +%Y%m%d-%H%M%S)"
          echo "version-label=$VERSION_LABEL" >> $GITHUB_OUTPUT
          
          BUCKET_NAME="elasticbeanstalk-${{ inputs.aws-region }}-$(aws sts get-caller-identity --query Account --output text)"
          S3_KEY="${{ inputs.eb-application-name }}/${VERSION_LABEL}.zip"
          
          aws s3 cp deployment.zip "s3://${BUCKET_NAME}/${S3_KEY}"
          
          echo "✅ Uploaded to s3://${BUCKET_NAME}/${S3_KEY}"
          echo "s3-bucket=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "s3-key=$S3_KEY" >> $GITHUB_OUTPUT
      
      - name: Create EB application version
        run: |
          VERSION_LABEL="${{ steps.upload-s3.outputs.version-label }}"
          S3_BUCKET="${{ steps.upload-s3.outputs.s3-bucket }}"
          S3_KEY="${{ steps.upload-s3.outputs.s3-key }}"
          
          aws elasticbeanstalk create-application-version \
            --application-name "${{ inputs.eb-application-name }}" \
            --version-label "$VERSION_LABEL" \
            --source-bundle S3Bucket="$S3_BUCKET",S3Key="$S3_KEY" \
            --description "Deployment by ${{ github.actor }} - Commit: ${{ github.sha }}" \
            --region ${{ inputs.aws-region }}
          
          echo "✅ Application version created: $VERSION_LABEL"
      
      - name: Deploy to ${{ inputs.environment }}
        run: |
          VERSION_LABEL="${{ steps.upload-s3.outputs.version-label }}"
          
          echo "🚀 Deploying to ${{ inputs.environment }} environment"
          echo "   Version: $VERSION_LABEL"
          echo "   Environment: ${{ inputs.eb-environment-name }}"
          
          aws elasticbeanstalk update-environment \
            --application-name "${{ inputs.eb-application-name }}" \
            --environment-name "${{ inputs.eb-environment-name }}" \
            --version-label "$VERSION_LABEL" \
            --region ${{ inputs.aws-region }}
          
          echo "✅ Deployment initiated"
      
      - name: Wait for deployment
        run: |
          echo "Waiting for environment to become ready..."
          
          MAX_ATTEMPTS=60
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name "${{ inputs.eb-application-name }}" \
              --environment-names "${{ inputs.eb-environment-name }}" \
              --region ${{ inputs.aws-region }} \
              --query 'Environments[0].Status' \
              --output text)
            
            HEALTH=$(aws elasticbeanstalk describe-environments \
              --application-name "${{ inputs.eb-application-name }}" \
              --environment-names "${{ inputs.eb-environment-name }}" \
              --region ${{ inputs.aws-region }} \
              --query 'Environments[0].Health' \
              --output text)
            
            echo "Status: $STATUS | Health: $HEALTH"
            
            if [ "$STATUS" = "Ready" ]; then
              if [ "$HEALTH" = "Green" ]; then
                echo "✅ Deployment successful!"
                break
              elif [ "$HEALTH" = "Yellow" ]; then
                echo "⚠️  Deployment complete but health is Yellow"
                break
              else
                echo "❌ Deployment complete but health is $HEALTH"
                exit 1
              fi
            elif [ "$STATUS" = "Updating" ]; then
              echo "Still updating... (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)"
            else
              echo "❌ Unexpected status: $STATUS"
              exit 1
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            sleep 30
          done
          
          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Deployment timed out"
            exit 1
          fi
      
      - name: Get environment URL
        id: get-url
        run: |
          ENV_URL=$(aws elasticbeanstalk describe-environments \
            --application-name "${{ inputs.eb-application-name }}" \
            --environment-names "${{ inputs.eb-environment-name }}" \
            --region ${{ inputs.aws-region }} \
            --query 'Environments[0].CNAME' \
            --output text)
          
          echo "environment-url=${ENV_URL}" >> $GITHUB_OUTPUT
      
      - name: Set deployment status to success
        if: success() && steps.create-deployment.outputs.result != ''
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.create-deployment.outputs.result }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'success',
              description: '${{ inputs.environment }} deployment completed',
              environment_url: 'http://${{ steps.get-url.outputs.environment-url }}'
            });
      
      - name: Set deployment status to failure
        if: failure() && steps.create-deployment.outputs.result != ''
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.create-deployment.outputs.result }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'failure',
              description: '${{ inputs.environment }} deployment failed'
            });
