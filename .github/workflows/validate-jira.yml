name: Validate JIRA

on:
  workflow_call:
    inputs:
      jira-project-keys:
        description: 'Comma-separated JIRA project keys (e.g., BDCDEV,BDCPROD,CSTS)'
        required: true
        type: string
    secrets:
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true

jobs:
  validate-branch:
    name: Validate Branch Name
    # Release branches (release/dd-mm-yyyy) don't carry a JIRA id by design — they
    # aggregate work from many feature branches that each already had their own
    # JIRA validation at PR time. Skip all three JIRA checks for any release source.
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'release/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name contains JIRA ID
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          PROJECT_KEYS="${{ inputs.jira-project-keys }}"
          
          echo "Checking branch: $BRANCH_NAME"
          echo "Valid project keys: $PROJECT_KEYS"
          
          # Convert comma-separated keys to regex pattern
          # BDCDEV,CSTS,BDCPROD → (BDCDEV|CSTS|BDCPROD)
          PATTERN=$(echo "$PROJECT_KEYS" | sed 's/,/|/g')
          
          if [[ "$BRANCH_NAME" =~ ($PATTERN)-[0-9]+ ]]; then
            JIRA_ID=$(echo "$BRANCH_NAME" | grep -oP "($PATTERN)-[0-9]+" | head -1)
            echo "✅ Branch name contains JIRA ID: $JIRA_ID"
            echo "jira-id=$JIRA_ID" >> $GITHUB_OUTPUT
          else
            echo "❌ Branch name must contain JIRA issue ID"
            echo "   Valid formats: feature/$PATTERN-123-description"
            echo "   Your branch: $BRANCH_NAME"
            exit 1
          fi
        id: branch-check
  
  validate-commits:
    name: Validate Commit Messages
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'release/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate commit messages
        run: |
          PROJECT_KEYS="${{ inputs.jira-project-keys }}"
          
          # Get all commits in this PR or push
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMITS=$(git log --format=%s ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          else
            COMMITS=$(git log --format=%s -1)
          fi
          
          echo "Checking commits:"
          echo "$COMMITS"
          echo ""
          echo "Valid project keys: $PROJECT_KEYS"
          
          # Convert comma-separated keys to regex pattern
          PATTERN=$(echo "$PROJECT_KEYS" | sed 's/,/|/g')
          
          # Check each commit message starts with JIRA ID
          ALL_VALID=true
          while IFS= read -r commit; do
            # Skip merge commits (they start with "Merge")
            if [[ $commit =~ ^Merge ]]; then
              echo "⏭️  Skipping merge commit: $commit"
              continue
            fi
            
            if [[ ! $commit =~ ^($PATTERN)-[0-9]+ ]]; then
              echo "❌ Invalid commit message (must start with JIRA ID): $commit"
              ALL_VALID=false
            else
              echo "✅ Valid commit: $commit"
            fi
          done <<< "$COMMITS"
          
          if [ "$ALL_VALID" = false ]; then
            echo ""
            echo "❌ All commit messages must start with JIRA ID"
            echo "   Valid examples: $PROJECT_KEYS-123 Add new feature"
            exit 1
          fi
          
          echo "✅ All commit messages are valid"
  
  validate-jira-issue:
    name: Validate JIRA Issue
    needs: validate-branch
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'release/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Get JIRA ID from branch
        id: get-jira-id
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          PROJECT_KEYS="${{ inputs.jira-project-keys }}"
          PATTERN=$(echo "$PROJECT_KEYS" | sed 's/,/|/g')
          
          JIRA_ID=$(echo "$BRANCH_NAME" | grep -oP "($PATTERN)-[0-9]+" | head -1)
          echo "jira-id=$JIRA_ID" >> $GITHUB_OUTPUT
          echo "JIRA ID: $JIRA_ID"
      
      - name: Check JIRA issue exists and is In Progress
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_ID: ${{ steps.get-jira-id.outputs.jira-id }}
        run: |
          echo "Checking JIRA issue: $JIRA_ID"
          
          # Get issue details
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_ID?fields=status")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ JIRA issue $JIRA_ID not found or not accessible"
            echo "HTTP Code: $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
          
          echo "✅ JIRA issue exists"
          
          # Check if issue is In Progress
          STATUS=$(echo "$BODY" | jq -r '.fields.status.name')
          echo "Issue status: $STATUS"
          
          if [ "$STATUS" != "In Progress" ]; then
            echo "⚠️  Warning: JIRA issue is not 'In Progress'"
            echo "   Current status: $STATUS"
            echo "   Please move the issue to 'In Progress' before merging"
            # Don't fail, just warn
          else
            echo "✅ JIRA issue is In Progress"
          fi